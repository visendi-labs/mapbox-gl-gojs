<!DOCTYPE html>
<html>

<head>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css' rel='stylesheet' />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"></script>
</head>

<body style="padding:0; margin:0">
    <div id="map" style="width:100vw; height:100vh;"></div>
    <div class="card shadow bg-base-100 absolute top-0 left-0 m-3">
        <div class="card-body">
            <div class="card-title">Thickness</div>
            <!-- HTMX map interactivity happens here! -->
            <div class="join">
                <button class="join-item btn" hx-post="/thickness?thick=1" hx-swap="beforeend" hx-target="body">
                    1
                </button>
                <button class="join-item btn" hx-post="/thickness?thick=2" hx-swap="beforeend" hx-target="body">
                    2
                </button>
                <button class="join-item btn" hx-post="/thickness?thick=3" hx-swap="beforeend" hx-target="body">
                    3
                </button>
                <button class="join-item btn" hx-post="/thickness?thick=4" hx-swap="beforeend" hx-target="body">
                    4
                </button>
            </div>
            <div class="card-title">Color</div>
            <ul class="menu bg-base-200 rounded-box w-56">
                <li><a hx-post="/color?color=%23000" hx-swap="beforeend" hx-target="body">Black</a></li>
                <li><a hx-post="/color?color=%23f55" hx-swap="beforeend" hx-target="body">Red</a></li>
                <li><a hx-post="/color?color=%233c3" hx-swap="beforeend" hx-target="body">Green</a></li>
                <li><a hx-post="/color?color=%2355f" hx-swap="beforeend" hx-target="body">Blue</a></li>
            </ul>
        </div>
    </div>
    <script>
        {{.}} // template engine (package html/template) puts things here
    </script>
</body>

</html>
